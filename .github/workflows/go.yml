name: Go

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:

  test:
    runs-on: ${{matrix.os}}
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: root
      DB_SSLMODE: disable
    strategy:
      matrix:
        go_version: ['1.18', '1.17', '>=1.18']
        os: ['ubuntu-latest', 'ubuntu-22.04']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go_version }}
      
    - name: Build-DB
      run: docker compose build
      
    - name: Create-DB
      run: docker compose up -d

    - name: Test
      run: go test -v main_test.go

    - name: Verificar binário gerado
      run: |
        ls -la
        file main

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: |
        rm -f main main.exe
        env GOOS=linux GOARCH=amd64 go build -o main main.go


    - name: Verificar binário gerado
      run: ls -la
      
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: programa
        path: main


  docker:
    needs: build
    uses: ./.github/workflows/Docker.yml
    secrets: inherit

  # Deploy_EC2:
  #   needs: build
  #   uses: ./.github/workflows/EC2.yml
  #   secrets: inherit

  Deploy_ECS:
    needs: docker
    uses: ./.github/workflows/ECS.yml
    secrets: inherit