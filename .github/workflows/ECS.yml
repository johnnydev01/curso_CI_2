name: Entrega Continua

on:
  workflow_call: 

jobs:
  ECS:
    runs-on: 'ubuntu-latest'
    steps:
    - name: Configurando credenciais da AWS
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Obtendo arquivo da tarefa
      run: aws ecs describe-task-definition --task-definition Tarefa_API-Go --query taskDefinition > task-definition.json
    
    - name: copia do task-definition
      run: cp task-definition.json task-definition.json.old

    - name: Ver conteúdo do task-definition.json
      run: cat task-definition.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: Go
        image: devjohnny/go_ci:${{ env.SAFE_TAG }}
        environment-variables: |
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_USER=${{ secrets.DB_USER }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_SSLMODE=require
          PORT=8000

    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: Servico_API-Go
        cluster: API-Go
        wait-for-service-stability: true

    - name: Requisição
      continue-on-error: true
      run: echo "REQUEST=0" >> $GITHUB_ENV ; sleep 30s ; wget LB-API-Go-167750543.us-east-2.elb.amazonaws.com:8000/johnny || echo "REQUEST=1" >> $GITHUB_ENV
    
    - name: Deploy to Amazon ECS service
      if: ${{ env.REQUEST != 0 }}
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: task-definition.json.old
        service: Servico_API-Go
        cluster: API-Go
        wait-for-service-stability: true
